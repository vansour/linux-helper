# .goreleaser.yaml — 自动发布配置
version: 2
project_name: linux-helper

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - "386"
    ldflags:
      - -s -w -X main.version={{ .Version }}
    binary: linux-helper

archives:
  - format: binary
    name_template: "{{ .Binary }}-linux-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
